<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Arquivos Excel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #2c3e50; }
        form { margin-bottom: 20px; }
        textarea { width: 100%; height: 300px; }
        .btn { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <h1>📊 Analisador de Arquivos Excel</h1>
    <form method="POST" enctype="multipart/form-data">
        <label>Dia da consulta:</label><br>
        <input type="text" name="dia" required><br><br>

        <label>Selecione o arquivo Excel:</label><br>
        <input type="file" name="file" accept=".xlsx,.xls" required><br><br>

        <button type="submit" class="btn">Analisar</button>
    </form>

    <h2>Resultado:</h2>
    <textarea readonly>{{ resultado }}</textarea>
</body>
</html>
